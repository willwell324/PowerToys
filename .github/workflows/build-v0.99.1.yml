name: Build PowerToys v0.99.1

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 180

    steps:
      - name: Checkout v0.99.1
        uses: actions/checkout@v4
        with:
          ref: v0.99.1
          submodules: recursive

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build (Release x64)
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
          .\tools\build\build.ps1 -Platform x64 -Configuration Release

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.release.x64.all.log
            build.release.x64.errors.log
            build.release.x64.warnings.log
            build.release.x64.trace.binlog

      - name: Upload x64 release output
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PowerToys-x64-Release
          path: x64\Release\
          if-no-files-found: error
